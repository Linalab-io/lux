brownfield:
  project_type: brownfield

  context_references:
    - path: Packages/com.linalab.lux/RustGateway~/src/main.rs
      role: primary
      summary: >
        Rust CLI entry point (~2193 lines). clap 4.5 derive pattern with
        top-level Command enum (Serve, Unity, Compile, RunTests, Schema,
        Completion) and nested UnityCommand enum (~20 variants). Uses
        anyhow::Result for error handling, serde_json for JSON output,
        clap_complete for shell completions. New Skill(SkillArgs) variant
        should be added to the Command enum following this pattern.

    - path: Packages/com.linalab.lux/RustGateway~/tests/gateway_cli_smoke.rs
      role: primary
      summary: >
        Integration test file (~1987 lines). Uses assert_command_help_contains
        pattern for CLI smoke tests. New skill subcommand tests should follow
        this established pattern.

    - path: Packages/com.linalab.lux/RustGateway~/Cargo.toml
      role: primary
      summary: >
        Rust dependencies. Key: clap 4.5 (derive+env), clap_complete 4.5,
        anyhow 1.0, serde 1.0 (derive), serde_json 1.0. No new dependencies
        should be needed for Phase 1.

    - path: .opencode/skills/lux-unity/SKILL.md
      role: primary
      summary: >
        Source skill file to migrate. YAML frontmatter with name and
        description fields, followed by markdown body with usage guidelines
        and command reference links. 35 lines total.

    - path: .opencode/skills/lux-unity/references/
      role: primary
      summary: >
        9 reference markdown files to migrate: backend-status.md,
        compile-tests.md, dynamic-code.md, launch.md, logs.md,
        object-hierarchy.md, playmode-input.md, record-replay.md,
        screenshots.md.

    - path: Packages/com.linalab.lux/RustGateway~/src/server.rs
      role: reference
      summary: WebSocket server module. Contains tests but no CLI patterns.

    - path: Packages/com.linalab.lux/RustGateway~/src/protocol.rs
      role: reference
      summary: Event protocol definitions. Contains tests but no CLI patterns.

    - path: Packages/com.linalab.lux/package.json
      role: reference
      summary: >
        UPM package manifest for com.linalab.lux v0.1.0. Provides naming
        and versioning patterns to mirror in skill manifest schema.

  existing_patterns:
    - "clap derive: top-level #[derive(Parser)] Cli struct → #[derive(Subcommand)] Command enum → nested args structs with #[derive(Parser)]"
    - "Nested subcommands: Command::Unity(UnityArgs) with its own #[derive(Subcommand)] UnityCommand enum — Skill should follow identical nesting"
    - "Error handling: functions return anyhow::Result<()>, use bail!() for early error returns, main propagates errors for automatic exit code 1"
    - "Output formatting: serde_json::to_string_pretty() for JSON output via println!()"
    - "Test pattern: integration tests in tests/gateway_cli_smoke.rs using assert_command_help_contains(&[args], expected_string)"
    - "SKILL.md frontmatter: YAML between --- delimiters with name and description fields"
    - "No explicit process::exit() calls — rely on anyhow Result propagation for exit codes"
    - "Async main: #[tokio::main] but subcommands can be sync (returning anyhow::Result<()>)"

  existing_dependencies:
    - "clap 4.5 (derive + env features)"
    - "clap_complete 4.5"
    - "anyhow 1.0"
    - "serde 1.0 (derive feature)"
    - "serde_json 1.0"
    - "tokio 1.44 (macros, net, rt-multi-thread, signal, sync)"

